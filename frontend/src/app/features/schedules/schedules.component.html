<div class="page">
  <div class="page-title">
    <div>
      <h1>Распореди</h1>
      <p class="muted">Генерирајте урамнотежени неделни планови, прегледувајте задачи и извезувајте Excel датотеки.</p>
    </div>
    <button mat-flat-button color="primary" type="button" routerLink="/schedules/new">
      <mat-icon>auto_awesome</mat-icon>
      Генерирај распоред
    </button>
  </div>

  <section class="panel table-wrap">
    <table mat-table [dataSource]="schedules">
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Наслов</th>
        <td mat-cell *matCellDef="let schedule">{{ schedule.title }}</td>
      </ng-container>
      <ng-container matColumnDef="range">
        <th mat-header-cell *matHeaderCellDef>Период</th>
        <td mat-cell *matCellDef="let schedule">{{ schedule.startDate }} - {{ schedule.endDate }}</td>
      </ng-container>
      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Креирано</th>
        <td mat-cell *matCellDef="let schedule">{{ schedule.createdAt | date: 'mediumDate' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let schedule" class="action-cell">
          <div class="row-actions">
            <button mat-icon-button type="button" aria-label="Отвори распоред" (click)="open(schedule)">
              <mat-icon>open_in_new</mat-icon>
            </button>
            <button mat-icon-button type="button" aria-label="Избриши распоред" (click)="remove(schedule)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </section>
</div>
